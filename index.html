<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ysabeau+Infant&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>LinkBio - Neymar Jr</title>
  </head>
  <body>
    <main>
      <video
        autoplay
        loop
        muted
        playsinline
        class="video-fundo"
        src="assets/icons/video/videoneymar.mp4"
        type="video/mp4"
      ></video>

      <section class="container">
        <img
          src="assets/icons/neymar.jpg"
          alt="Neymar Jr"
          class="foto-perfil"
        />
        <h1>
          <span>Ne</span>ymar Jr
          <img
            src="assets/icons/verificado.png"
            alt="verificado"
            class="verificado"
          />
        </h1>

        <div class="arvore-links">
          <div>
            <img src="assets/icons/youtube.png" alt="YouTube" />
            <a href="https://www.youtube.com/user/NeymarJr" target="_blank"
              >Siga meu canal no YouTube</a
            >
          </div>

          <div>
            <img src="assets/icons/instagram.png" alt="Instagram" />
            <a href="https://www.instagram.com/neymarjr/" target="_blank"
              >Me siga no Instagram</a
            >
          </div>

          <div>
            <img src="assets/icons/twitter.png" alt="Twitter" />
            <a href="https://twitter.com/neymarjr" target="_blank">Me siga no Twitter</a>
          </div>

          <div>
            <img src="assets/icons/facebook.png" alt="Facebook" />
            <a href="https://www.facebook.com/neymarjr" target="_blank">Me siga no Facebook</a>
          </div>

          <div>
            <img src="assets/icons/twitch.png" alt="Twitch" />
            <a href="https://www.twitch.tv/neymarjr" target="_blank">Me siga no Twitch</a>
          </div>
        </div>
      </section>
    </main>

    <section class="secao-tabela">
      <h2 class="titulo-tabela">Estatísticas</h2>

      <div class="tabela-container">
        <table>
          <thead>
            <th>Times</th>
            <th>Temporadas</th>
            <th>Jogos</th>
            <th>Gols</th>
            <th>Assistências</th>
            <th>Títulos</th>
          </thead>

          <tbody>
            <tr>
              <td><img src="assets/icons/cbf.png" alt="CBF" />Brasil</td>
              <td>13</td>
              <td>124</td>
              <td>77</td>
              <td>77</td>
              <td>2</td>
            </tr>

            <tr>
              <td><img src="assets/icons/santos.png" alt="Santos" />Santos</td>
              <td>5</td>
              <td>230</td>
              <td>138</td>
              <td>77</td>
              <td>6</td>
            </tr>

            <tr>
              <td>
                <img
                  src="assets/icons/barcelona.png"
                  alt="Barcelona"
                />Barcelona
              </td>
              <td>4</td>
              <td>186</td>
              <td>105</td>
              <td>77</td>
              <td>8</td>
            </tr>

            <tr>
              <td><img src="assets/icons/psg.png" alt="PSG" />PSG</td>
              <td>6</td>
              <td>173</td>
              <td>118</td>
              <td>77</td>
              <td>13</td>
            </tr>

            <tr>
              <td>
                <img src="assets/icons/alhilal.png" alt="Al-Hilal" />Al-Hilal
              </td>
              <td>1</td>
              <td>0</td>
              <td>0</td>
              <td>77</td>
              <td>0</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </body>
</html>
